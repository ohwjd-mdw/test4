name: Release stale locks

# Scheduled reaper: clears locks older than locking.stale_after_minutes (from
# config.yaml), returning abandoned tasks to the pool. Cron timing is coarse and
# can be delayed by GitHub; the logic compares real elapsed time, so that's fine.
# Thin caller — the real code lives in the central automation repo at the `ref`
# below. (No fork PR is involved here; this runs on the campaign repo itself.)
on:
  schedule:
    - cron: '*/15 * * * *' # every ~15 min; tolerant of imprecise firing
  workflow_dispatch: {} # allow a manual run

concurrency:
  group: reaper-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out central automation code
        uses: actions/checkout@v4
        with:
          repository: lets-encode/instigation # central repo (for now)
          # ⚠️ BEFORE PRODUCTION: pin `ref` to an immutable tag/SHA, not the
          # moving `main` branch. See the central repo's DESIGN.md hardening
          # checklist. `main` = iteration only.
          ref: main
          path: central
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Release stale locks
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REPO: ${{ github.repository }}
        run: node central/scripts/reap.mjs
